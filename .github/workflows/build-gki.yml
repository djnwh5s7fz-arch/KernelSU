name: Build KernelSU for GKI

on:
  workflow_dispatch:
    inputs:
      device:
        description: '设备代号'
        required: true
        default: 'phone'
      limewire_url:
        description: 'LimeWire 预览链接'
        required: true
      arch:
        description: '架构'
        required: true
        default: 'arm64'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          sudo apt update
          sudo apt install -y wget curl jq
          pip install pyyaml

      - name: 从 LimeWire 自动解析并下载 boot.img
        run: |
          curl -s "${{ inputs.limewire_url }}" | grep -oE 'https://[^"]+\.(img|IMG)' > url.txt
          wget -i url.txt -O original_boot.img

      - name: 给 boot.img 打 KernelSU 补丁
        run: python3 ksu.py patch --boot original_boot.img --output ksu_${{ inputs.device }}.img

      - name: 上传打好补丁的镜像
        uses: actions/upload-artifact@v4
        with:
          name: ksu_${{ inputs.device }}
          path: ksu_${{ inputs.device }}.img
