name: Build KernelSU for GKI

on:
  workflow_dispatch:
    inputs:
      device:
        description: '设备代号'
        required: true
        default: 'myphone'
      arch:
        description: '架构'
        required: true
        default: 'arm64'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true  # 拉取子模块，确保 kernel 目录完整

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          sudo apt update
          sudo apt install -y wget python3-pip
          pip install pyyaml

      - name: 下载 boot.img
        run: wget -O original_boot.img "https://files.catbox.moe/tynfs3.img"

      - name: 给 boot.img 打 KernelSU 补丁
        run: |
          cd kernel
          python3 patch_boot.py --boot ../original_boot.img --output ../ksu_${{ inputs.device }}.img

      - name: 上传打好补丁的镜像
        uses: actions/upload-artifact@v4
        with:
          name: ksu_${{ inputs.device }}
          path: ksu_${{ inputs.device }}.img
