name: Build KernelSU Patched Boot Image

on:
  workflow_dispatch:
    inputs:
      device:
        description: '设备代号'
        required: true
        default: 'myphone'
      boot_img_url:
        description: 'boot.img 直链'
        required: true
        default: 'https://files.catbox.moe/tynfs3.img'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          sudo apt update
          sudo apt install -y wget build-essential
          pip install pyyaml

      - name: 下载 boot.img
        run: wget -O original_boot.img ${{ inputs.boot_img_url }}

      - name: 构建 ksud 并打补丁
        run: |
          make
          ./build/bin/ksud patch bootimg original_boot.img -o ksu_${{ inputs.device }}.img

      - name: 上传打好补丁的镜像
        uses: actions/upload-artifact@v4
        with:
          name: ksu_${{ inputs.device }}_boot
          path: ksu_${{ inputs.device }}.img
