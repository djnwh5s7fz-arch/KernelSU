name: Build KernelSU Patched Boot Image

on:
  workflow_dispatch:
    inputs:
      device:
        description: 'Device codename'
        required: true
        default: 'myphone'
      boot_img_url:
        description: 'Direct download URL of boot.img'
        required: true
        default: 'https://files.catbox.moe/tynfs3.img'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout KernelSU official repo
        uses: actions/checkout@v4
        with:
          repository: tiann/KernelSU
          ref: main
          submodules: true

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y wget build-essential
          pip install pyyaml

      - name: Download boot.img
        run: wget -O original_boot.img ${{ inputs.boot_img_url }}

      - name: Build ksud and patch boot.img
        run: |
          make
          ./build/bin/ksud patch bootimg original_boot.img -o ksu_${{ inputs.device }}.img

      - name: Upload patched boot.img
        uses: actions/upload-artifact@v4
        with:
          name: ksu_${{ inputs.device }}_boot
          path: ksu_${{ inputs.device }}.img
